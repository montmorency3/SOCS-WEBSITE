<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="project/SOCS-WEBSITE/public/assets/css/landing.css">
    <title>Home</title>
</head>

<style> 

.navbar {
    display: flex; /* Enables flexbox layout */
    justify-content: space-between; /* Distribute buttons evenly */
    align-items: center; /* Vertically center the buttons */
    padding: 10px 20px; /* Optional padding for the navbar */
    background-color: #333; /* Navbar background color */
}
.nav-button {
    background-color: #4CAF50; /* Green button color */
    color: white; /* White text color */
    border: none; /* Remove button border */
    padding: 10px 20px; /* Button padding */
    font-size: 16px; /* Text size */
    cursor: pointer; /* Pointer cursor on hover */
}

/* Optional styling for the last button to add right margin */
.last-button {
    margin-right: 40px; /* Adds a 40px margin to the right of the last button */
}

/* Hover effect for buttons */
.nav-button:hover {
    background-color: #45a049; /* Slightly darker green on hover */
}

</style>
<body>
    <div class="navBar" >
        <button class="nav-button">Home</button>
        <button class="nav-button">About</button>
        <button class="nav-button last-button">Contact</button>
    </div>
    
</body>
</html>
